<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Deen Studio</title>
    
    <!-- CSS Files -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/tabs.css">
    <link rel="stylesheet" href="css/planner.css">
</head>
<body>
    <div class="container">
        <!-- Settings Modal -->
        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings</h2>
                    <span class="close-modal" onclick="DeenStudio.UI.closeSettings()">&times;</span>
                </div>
                
                <div class="setting-item">
                    <div class="setting-label">Theme</div>
                    <div class="theme-buttons">
                        <button class="theme-btn" id="darkThemeBtn" onclick="DeenStudio.Settings.setTheme('dark')">Dark</button>
                        <button class="theme-btn" id="lightThemeBtn" onclick="DeenStudio.Settings.setTheme('light')">Light</button>
                    </div>
                </div>

                <div class="setting-item">
                    <div class="setting-label">Font Size</div>
                    <div class="font-size-control">
                        <div class="font-size-display" id="fontSizeDisplay">16px</div>
                        <input type="range" min="12" max="24" value="16" step="1" class="font-size-slider" id="fontSizeSlider" oninput="DeenStudio.Settings.updateFontSize(this.value)">
                        <div class="font-size-labels">
                            <span>Small</span>
                            <span>Medium</span>
                            <span>Large</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <header class="glass-header">
            <div>
                <h1>Deen Studio</h1>
                <div class="subtitle">list & intention</div>
            </div>
            <div class="header-actions">
                <div class="settings-icon" onclick="DeenStudio.UI.openSettings()">⚙️</div>
            </div>
        </header>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">total duas</div>
                <div class="stat-number" id="totalDuas">12</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">habits done</div>
                <div class="stat-number" id="habitsDone">0/8</div>
            </div>
        </div>

        <!-- Main Tabs -->
        <div class="main-tab-nav">
            <button class="tab" id="tabPlanner" onclick="DeenStudio.UI.switchMainTab('planner')">Daily Planner</button>
            <button class="tab active" id="tabDua" onclick="DeenStudio.UI.switchMainTab('dua')">Dua</button>
            <button class="tab" id="tabHabit" onclick="DeenStudio.UI.switchMainTab('habit')">Habit Tracker</button>
        </div>

        <!-- Daily Planner Section -->
        <div id="plannerSection" class="list-container hidden">
            <div class="planner-header">
                <div class="planner-title-wrapper">
                    <h2 class="planner-title">Ramadan Schedule</h2>
                    <div class="sync-status" id="plannerSyncStatus">✓ Ramadan Mubarak</div>
                </div>
                
                <!-- Time Distribution Cards -->
                <div class="time-distribution">
                    <div class="distrib-item" style="--distrib-color: #8b5cf6;">
                        <span class="distrib-label">DEEN</span>
                        <span class="distrib-value">3:20</span>
                        <span class="distrib-bar" style="width: 14%"></span>
                    </div>
                    <div class="distrib-item" style="--distrib-color: #22c55e;">
                        <span class="distrib-label">QURAN</span>
                        <span class="distrib-value">1:30</span>
                        <span class="distrib-bar" style="width: 6%"></span>
                    </div>
                    <div class="distrib-item" style="--distrib-color: #3b82f6;">
                        <span class="distrib-label">STUDY</span>
                        <span class="distrib-value">11:30</span>
                        <span class="distrib-bar" style="width: 48%"></span>
                    </div>
                    <div class="distrib-item" style="--distrib-color: #a855f7;">
                        <span class="distrib-label">SLEEP</span>
                        <span class="distrib-value">5:05</span>
                        <span class="distrib-bar" style="width: 21%"></span>
                    </div>
                    <div class="distrib-item" style="--distrib-color: #f59e0b;">
                        <span class="distrib-label">MAINTENANCE</span>
                        <span class="distrib-value">2:10</span>
                        <span class="distrib-bar" style="width: 9%"></span>
                    </div>
                </div>
            </div>

            <!-- Timeline Schedule - Will be populated by JavaScript -->
            <div class="timeline"></div>
        </div>

        <!-- Dua Section with Sub-tabs -->
        <div id="duaSection" class="list-container">
            <!-- Sub-tabs for Duniya/Akhira -->
            <div class="sub-tab-nav">
                <button class="tab active" id="subTabDuniya" onclick="DeenStudio.UI.switchSubTab('duniya')">Duniya</button>
                <button class="tab" id="subTabAkhira" onclick="DeenStudio.UI.switchSubTab('akhira')">Akhira</button>
            </div>

            <!-- Duniya Sub-section -->
            <div id="duniyaSubsection">
                <div id="duniyaList" class="dua-list"></div>
            </div>

            <!-- Akhira Sub-section (hidden by default) -->
            <div id="akhiraSubsection" class="hidden">
                <div id="akhiraList" class="dua-list"></div>
            </div>
        </div>

        <!-- Habit Tracker Section -->
        <div id="habitSection" class="list-container hidden">
            <div id="habitList" class="habit-list"></div>
        </div>
    </div>

    <!-- JavaScript Files -->
    <script src="js/main.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/habits.js"></script>
    <script src="js/duas.js"></script>
    <script src="js/planner.js"></script>
    
    <!-- Initialize App -->
    <script>
        // Initialize the application
        document.addEventListener('DOMContentLoaded', () => {
            DeenStudio.init();
        });
    </script>
</body>
</html>
